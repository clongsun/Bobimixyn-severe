<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bobimixyn 劑量計算工具</title>
    <style>
        :root {
            --primary: #00796b;
            --bg: #e2e8f0;
            --text-main: #2c3e50;
            --accent: #d32f2f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            margin: 15px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--primary);
            color: #fff;
            padding: 12px 0;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .input-section {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .input-section label {
            display: block;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .weight-input {
            width: 120px;
            font-size: 28px;
            padding: 4px;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            color: var(--primary);
            font-weight: bold;
            box-sizing: border-box;
        }

        .weight-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* 緊湊結果區塊 */
        .result-section {
            display: none;
            padding: 12px 15px;
            background: #fff;
        }

        .res-row {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .res-title {
            font-size: 13px;
            font-weight: bold;
            color: #475569;
            margin-bottom: 2px;
        }

        .vial-num {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1.2;
        }

        .q12h {
            color: var(--accent);
            font-size: 16px;
            margin-left: 4px;
        }

        .vial-detail {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }
